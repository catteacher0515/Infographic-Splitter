services:
  - type: web
    name: infographic-splitter
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: GRADIO_SERVER_NAME
        value: 0.0.0.0
      - key: DASHSCOPE_API_KEY
        sync: false
